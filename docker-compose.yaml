services:
  evolution_api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution_api
    restart: always
    ports:
      - "8084:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - DATABASE_ENABLED=false
      - DATABASE_PROVIDER=json
      - DATABASE_CONNECTION_JSON_ENABLED=true
      - AUTH_AUTHENTICATION_API_KEY=123456
      - AUTHENTICATION_API_KEY=123456
      - AUTH_API_KEY=123456
      - DASHBOARD_ENABLED=true
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances: